<svg viewBox="0 0 120 120" width="100%" height="100%" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Body -->
    <ellipse cx="60" cy="70" rx="28" ry="30" fill="#4169E1" />
    <ellipse cx="60" cy="76" rx="17" ry="15" fill="#7EB6E8" />
    <!-- Head -->
    <circle cx="60" cy="42" r="23" fill="#4169E1" />
    <!-- Left ear -->
    <ellipse cx="34" cy="22" rx="11" ry="18" fill="#4169E1" transform="rotate(-18 34 22)" />
    <ellipse cx="34" cy="22" rx="6" ry="12" fill="#6B8DD6" transform="rotate(-18 34 22)" />
    <ellipse cx="34" cy="22" rx="3.5" ry="8" fill="#FF9ECE" transform="rotate(-18 34 22)" />
    <!-- Right ear - perked up -->
    <ellipse cx="86" cy="18" rx="11" ry="18" fill="#4169E1" transform="rotate(25 86 18)" />
    <ellipse cx="86" cy="18" rx="6" ry="12" fill="#6B8DD6" transform="rotate(25 86 18)" />
    <ellipse cx="86" cy="18" rx="3.5" ry="8" fill="#FF9ECE" transform="rotate(25 86 18)" />
    <!-- Eyes -->
    <ellipse cx="51" cy="39" rx="6.5" ry="7.5" fill="white" />
    <ellipse cx="69" cy="39" rx="6.5" ry="7.5" fill="white" />
    <circle cx="53" cy="39" r="3.2" fill="#1a1a2e" />
    <circle cx="67" cy="39" r="3.2" fill="#1a1a2e" />
    <circle cx="54" cy="37" r="1.2" fill="white" />
    <circle cx="68" cy="37" r="1.2" fill="white" />
    <!-- Nose -->
    <ellipse cx="60" cy="45" rx="3.2" ry="2.2" fill="#2a2a4e" />
    <!-- Wide happy smile -->
    <path d="M50 50 Q55 56 60 55 Q65 56 70 50" stroke="#1a1a2e" stroke-width="1.8" fill="none" stroke-linecap="round" />
    <!-- Left arm down -->
    <ellipse cx="36" cy="70" rx="7" ry="4.5" fill="#4169E1" transform="rotate(-10 36 70)" />
    <!-- Right arm waving up -->
    <path d="M84 60 Q92 48 96 38" stroke="#4169E1" stroke-width="8" fill="none" stroke-linecap="round" />
    <!-- Waving hand -->
    <circle cx="98" cy="35" r="5" fill="#4169E1" />
    <line x1="100" y1="30" x2="103" y2="26" stroke="#4169E1" stroke-width="2.5" stroke-linecap="round" />
    <line x1="98" y1="30" x2="99" y2="25" stroke="#4169E1" stroke-width="2.5" stroke-linecap="round" />
    <line x1="96" y1="30" x2="95" y2="26" stroke="#4169E1" stroke-width="2.5" stroke-linecap="round" />
    <!-- Feet -->
    <ellipse cx="48" cy="96" rx="9" ry="4.5" fill="#4169E1" />
    <ellipse cx="72" cy="96" rx="9" ry="4.5" fill="#4169E1" />
    <!-- Sparkle near wave -->
    <text x="104" y="22" font-size="10" opacity="0.5">✨</text>
</svg>

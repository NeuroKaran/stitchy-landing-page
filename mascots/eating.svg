<svg viewBox="0 0 120 120" width="100%" height="100%" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Body -->
    <ellipse cx="60" cy="70" rx="30" ry="32" fill="#4169E1" />
    <ellipse cx="60" cy="77" rx="18" ry="16" fill="#7EB6E8" />

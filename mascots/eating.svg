    <circle cx="60" cy="42" r="24" fill="#4169E1" />
    <!-- Left ear -->
    <ellipse cx="32" cy="22" rx="12" ry="20" fill="#4169E1" transform="rotate(-25 32 22)" />
    <ellipse cx="32" cy="22" rx="7" ry="14" fill="#6B8DD6" transform="rotate(-25 32 22)" />
    <ellipse cx="32" cy="22" rx="4" ry="10" fill="#FF9ECE" transform="rotate(-25 32 22)" />
    <!-- Right ear -->
    <ellipse cx="88" cy="22" rx="12" ry="20" fill="#4169E1" transform="rotate(25 88 22)" />
    <ellipse cx="88" cy="22" rx="7" ry="14" fill="#6B8DD6" transform="rotate(25 88 22)" />
    <ellipse cx="88" cy="22" rx="4" ry="10" fill="#FF9ECE" transform="rotate(25 88 22)" />
    <!-- Eyes - excited -->
    <ellipse cx="50" cy="38" rx="7" ry="8" fill="white" />
    <ellipse cx="70" cy="38" rx="7" ry="8" fill="white" />
    <circle cx="52" cy="37" r="4" fill="#1a1a2e" />
    <circle cx="68" cy="37" r="4" fill="#1a1a2e" />
    <circle cx="53.5" cy="35.5" r="1.5" fill="white" />
    <circle cx="69.5" cy="35.5" r="1.5" fill="white" />
    <!-- Nose -->
    <ellipse cx="60" cy="44" rx="3.5" ry="2.5" fill="#2a2a4e" />

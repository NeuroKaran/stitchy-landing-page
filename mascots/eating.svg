    <!-- Left arm holding bowl -->
    <ellipse cx="32" cy="68" rx="9" ry="5" fill="#4169E1" transform="rotate(-30 32 68)" />
    <!-- Right arm -->
    <ellipse cx="88" cy="68" rx="9" ry="5" fill="#4169E1" transform="rotate(20 88 68)" />
    <!-- Bowl of food -->
    <ellipse cx="38" cy="62" rx="12" ry="5" fill="#E8D5A3" />
    <path d="M26 62 Q32 72 50 62" fill="#C4856A" opacity="0.6" />
    <circle cx="34" cy="59" r="2" fill="#A8B89C" />
    <circle cx="40" cy="58" r="1.5" fill="#C75B5B" />
    <circle cx="37" cy="60" r="1.8" fill="#E8D5A3" />
    <!-- Feet -->
    <ellipse cx="48" cy="98" rx="10" ry="5" fill="#4169E1" />
    <ellipse cx="72" cy="98" rx="10" ry="5" fill="#4169E1" />
